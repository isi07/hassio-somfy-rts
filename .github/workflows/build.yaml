name: Build & Publish Add-on

on:
  push:
    tags:
      - "v*"      # v0.1.0, v0.1.0-beta.1, v1.0.0 ...
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r somfy-rts/requirements.txt

      - name: Run ruff
        run: ruff check somfy-rts/somfy_rts/

      - name: Run tests
        run: |
          pip install -r somfy-rts/requirements-test.txt
          cd somfy-rts
          pytest tests/ -v

      - name: Lint YAML
        run: |
          pip install yamllint
          yamllint .github/workflows/build.yaml
          yamllint blueprints/template/
          yamllint somfy-rts/config.yaml

      - name: Validate HA Blueprints
        run: |
          python -c "
          import yaml, sys

          # Allow HA-specific tags like !input without errors
          class HALoader(yaml.SafeLoader):
              pass
          HALoader.add_multi_constructor('', lambda l, t, n: l.construct_scalar(n))

          files = [
            'blueprints/template/somfy_rts_awning.yaml',
            'blueprints/template/somfy_rts_shutter.yaml'
          ]
          for f in files:
              with open(f) as fp:
                  data = yaml.load(fp, Loader=HALoader)
              assert 'blueprint' in data, f'{f}: missing blueprint key'
              assert 'domain' in data['blueprint'], f'{f}: missing domain'
              assert data['blueprint']['domain'] == 'template', f'{f}: wrong domain'
              print(f'{f}: OK')
          "

      - name: Lint JavaScript
        run: |
          npm install -g eslint@8
          eslint somfy-rts/somfy_rts/web/static/*.js \
            --env browser,es2021 \
            --rule '{"no-unused-vars": "warn", "no-undef": "warn"}' \
            --no-eslintrc \
            || true

      - name: Lint Shell
        run: |
          sudo apt-get install -y shellcheck
          shellcheck somfy-rts/run.sh

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: somfy-rts/Dockerfile

      - name: Validate JSON
        run: |
          python -m json.tool somfy-rts/somfy_rts/device_profiles.json > /dev/null
          echo "JSON valid"

      - name: Validate HA Add-on config
        uses: frenck/action-addon-linter@v2
        with:
          path: "./somfy-rts"

      - name: Lint GitHub Actions workflow
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint .github/workflows/build.yaml

  build:
    name: "Build ${{ matrix.arch }}"
    needs: lint
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [amd64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from config.yaml
        id: version
        run: |
          echo "version=$(grep '^version:' somfy-rts/config.yaml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: somfy-rts
          file: somfy-rts/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ghcr.io/isi07/somfy-rts:${{ steps.version.outputs.version }}-${{ matrix.arch }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base-python:3.12-alpine3.18
            BUILD_VERSION=${{ steps.version.outputs.version }}

  manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from config.yaml
        id: version
        run: |
          echo "version=$(grep '^version:' somfy-rts/config.yaml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/isi07/somfy-rts:${{ steps.version.outputs.version }} \
            -t ghcr.io/isi07/somfy-rts:latest \
            ghcr.io/isi07/somfy-rts:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/isi07/somfy-rts:${{ steps.version.outputs.version }}-aarch64

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: manifest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.cliff.outputs.content }}
          # Pre-release for any tag containing a hyphen (e.g. v0.1.0-beta.1)
          prerelease: ${{ contains(github.ref, '-') }}
