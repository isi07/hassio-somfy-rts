name: Build & Publish Add-on

on:
  push:
    tags:
      - "v*"      # v0.1.0, v0.1.0-beta.1, v1.0.0 ...
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r somfy-rts/requirements.txt

      - name: Run ruff
        run: ruff check somfy-rts/somfy_rts/

  build:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    # Build only on tag pushes, independent of lint
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build add-on with home-assistant/builder
        uses: home-assistant/builder@2024.03.5
        with:
          args: |
            --all \
            --target somfy-rts \
            --image somfy-rts \
            --docker-hub ghcr.io/isi07 \
            --addon
        env:
          CAS_API_KEY: ${{ secrets.CAS_API_KEY }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v3
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          # Pre-release for any tag containing a hyphen (e.g. v0.1.0-beta.1)
          prerelease: ${{ contains(github.ref, '-') }}
