# git-cliff Konfiguration — Conventional Commits → CHANGELOG
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
Alle nennenswerten Änderungen werden hier dokumentiert.
Format: [Conventional Commits](https://www.conventionalcommits.org/de/)
\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = []

commit_parsers = [
  { message = "^feat",      group = "Neu hinzugefügt" },
  { message = "^fix",       group = "Fehlerbehebungen" },
  { message = "^perf",      group = "Performance" },
  { message = "^refactor",  group = "Refactoring" },
  { message = "^docs",      group = "Dokumentation" },
  { message = "^chore",     group = "Sonstiges" },
  { message = "^ci",        group = "CI/CD" },
  { message = "^test",      group = "Tests" },
  { body = ".*security",    group = "Sicherheit" },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
