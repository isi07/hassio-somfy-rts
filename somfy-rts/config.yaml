name: "Somfy RTS"
version: "0.3.13"
slug: somfy_rts
description: "Controls Somfy RTS devices (awnings, shutters) via NanoCUL USB stick with culfw firmware over MQTT"
url: "https://github.com/isi07/hassio-somfy-rts"

arch:
  - aarch64
  - amd64

init: false

homeassistant: "2024.11.0"

uart: true

map:
  - type: data
    read_only: false

ports:
  8099/tcp: 8099

ingress: true
panel_icon: mdi:blinds

options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  usb_port: "/dev/ttyACM0"
  baudrate: 9600
  address_prefix: "A000"
  log_level: "info"
  log_format: "text"
  simulation_mode: false
  file_logging: false
  timezone: "Europe/Berlin"

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  usb_port: str
  baudrate: int
  address_prefix: str
  log_level: list(debug|info|warning|error)
  log_format: list(text|json)
  simulation_mode: bool
  file_logging: bool
  timezone: str

image: "ghcr.io/isi07/somfy-rts"
