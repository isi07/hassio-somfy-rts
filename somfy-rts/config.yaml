name: "Somfy RTS"
version: "0.1.0"
slug: somfy_rts
description: "Controls Somfy RTS devices (awnings, shutters) via NanoCUL USB stick with culfw firmware over MQTT"
url: "https://github.com/isi07/hassio-somfy-rts"
license: MIT

arch:
  - aarch64
  - amd64
  - armv7

startup: application
boot: auto
init: false

homeassistant: "2024.11.0"

uart: true

map:
  - type: data
    read_only: false

ports:
  8099/tcp: 8099

ingress: true
ingress_port: 8099
panel_icon: mdi:blinds

options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  usb_port: "/dev/ttyACM0"
  baudrate: 9600
  address_prefix: "A000"
  log_level: "info"

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  usb_port: str
  baudrate: int
  address_prefix: str
  log_level: list(debug|info|warning|error)

image: "ghcr.io/isi07/hassio-somfy-rts/somfy-rts"
