blueprint:
  name: "Somfy RTS Rollladen"
  description: >
    Template Cover für einen Somfy RTS Rollladen.
    Zustand wird über einen Kontaktsensor ermittelt (z.B. Rollladenkontakt).
    Robuster Betrieb — funktioniert auch mit MY-Taste und manueller Fernbedienung.
  domain: template
  input:
    somfy_cover_entity:
      name: Somfy RTS Cover-Entität
      description: Die Cover-Entität aus dem Somfy RTS Add-on (Modus A).
      selector:
        entity:
          domain: cover
    contact_sensor:
      name: Kontaktsensor
      description: >
        Sensor der anzeigt ob der Rollladen geschlossen ist.
        Wenn der Sensor den "geschlossen"-Zustand meldet = Rollladen unten.
      selector:
        entity:
          domain: binary_sensor
    contact_closed_state:
      name: Sensor-Zustand wenn Rollladen geschlossen
      description: Welcher Zustand des Sensors bedeutet "Rollladen geschlossen".
      default: "on"
      selector:
        select:
          options:
            - label: "Sensor an (on) = Rollladen geschlossen"
              value: "on"
            - label: "Sensor aus (off) = Rollladen geschlossen"
              value: "off"

cover:
  - name: !input somfy_cover_entity
    device_class: shutter
    open_action:
      - action: cover.open_cover
        target:
          entity_id: !input somfy_cover_entity
    close_action:
      - action: cover.close_cover
        target:
          entity_id: !input somfy_cover_entity
    stop_action:
      - action: cover.stop_cover
        target:
          entity_id: !input somfy_cover_entity
    value_template: >
      {% if states(contact_sensor) == contact_closed_state %}
        closed
      {% else %}
        open
      {% endif %}
    availability_template: >
      {{ states(contact_sensor) not in ['unknown', 'unavailable'] and
         states(somfy_cover_entity) not in ['unknown', 'unavailable'] }}

variables:
  somfy_cover_entity: !input somfy_cover_entity
  contact_sensor: !input contact_sensor
  contact_closed_state: !input contact_closed_state
